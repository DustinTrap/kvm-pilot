<svg viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc">
  <title id="ttl">The run ledger and the maturity ladder</title>
  <desc id="dsc">Left: evidence sources — live fleet runs, the one-command test-report, community hardware-report issues — flow into the run ledger, a JSONL file of device, firmware, capability and outcome rows that ships inside the wheel. Middle: aggregation per device × firmware × capability with a minimum-sample gate. Right: the derived maturity ladder from alpha through beta and rc to ga. Maturity is computed from evidence, never hand-set; failures are recorded, not hidden.</desc>
  <style>
    text{font-family:var(--font-sans,ui-sans-serif,system-ui,sans-serif);}
    .band{fill:#f1efe8;stroke:#d3d1c7;stroke-width:1;}
    .card{fill:#fff;stroke:#b4b2a9;stroke-width:1.5;}
    .green{fill:#eaf3de;stroke:#3b6d11;stroke-width:1.5;}
    .purple{fill:#eeedfe;stroke:#534ab7;stroke-width:1.75;}
    .chip0{fill:#f1efe8;stroke:#b4b2a9;stroke-width:1.5;}
    .chip1{fill:#eaf3de;stroke:#3b6d11;stroke-width:1.5;}
    .chip2{fill:#d9ecc2;stroke:#3b6d11;stroke-width:1.75;}
    .chip3{fill:#c0dd97;stroke:#27500a;stroke-width:2;}
    .h{fill:#2c2c2a;font-weight:500;font-size:18px;}
    .sub{fill:#5f5e5a;font-weight:400;font-size:12px;}
    .t{fill:#2c2c2a;font-weight:500;font-size:12.5px;}
    .ts{fill:#5f5e5a;font-weight:400;font-size:11px;}
    .tg{fill:#27500a;font-weight:600;font-size:12.5px;}
    .tgd{fill:#1d3a08;font-weight:600;font-size:12.5px;}
    .mono{fill:#5f5e5a;font-family:var(--font-mono,ui-monospace,monospace);font-weight:400;font-size:10px;}
    .monofail{fill:#791f1f;font-family:var(--font-mono,ui-monospace,monospace);font-weight:500;font-size:10px;}
    .lab{fill:#888780;font-weight:500;font-size:11px;}
    .cn{stroke:#888780;}
    .mkn{fill:#888780;}
    @media (prefers-color-scheme:dark){
      .band{fill:#211f1b;stroke:#4a4641;}
      .card{fill:#2a2723;stroke:#5f5e5a;}
      .green{fill:#27500a;stroke:#97c459;}
      .purple{fill:#3c3489;stroke:#afa9ec;}
      .chip0{fill:#2a2723;stroke:#5f5e5a;}
      .chip1{fill:#27500a;stroke:#97c459;}
      .chip2{fill:#356312;stroke:#97c459;}
      .chip3{fill:#43791d;stroke:#c0dd97;}
      .h{fill:#f1efe8;} .sub{fill:#b4b2a9;} .t{fill:#f1efe8;} .ts{fill:#b4b2a9;} .lab{fill:#908d85;}
      .tg{fill:#c0dd97;} .tgd{fill:#e2f3cc;} .mono{fill:#b4b2a9;} .monofail{fill:#f7c1c1;}
    }
  </style>

  <text x="30" y="34" class="h">kvm-pilot — evidence in, maturity out</text>
  <text x="30" y="54" class="sub">A capability's maturity is derived from the run ledger — real runs on real hardware — never hand-set. Failures are recorded, not hidden.</text>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path class="mkn" d="M0,0 L6,3 L0,6 Z"/></marker>
  </defs>

  <!-- evidence sources -->
  <text x="30" y="92" class="lab">evidence sources</text>
  <rect class="card" x="30" y="102" width="190" height="44" rx="4"/>
  <text x="125" y="121" class="t" text-anchor="middle">live fleet runs</text>
  <text x="125" y="137" class="ts" text-anchor="middle">every real call logs an outcome</text>
  <rect class="card" x="30" y="156" width="190" height="44" rx="4"/>
  <text x="125" y="175" class="t" text-anchor="middle">kvm-pilot test-report</text>
  <text x="125" y="191" class="ts" text-anchor="middle">one-command hardware intake</text>
  <rect class="card" x="30" y="210" width="190" height="44" rx="4"/>
  <text x="125" y="229" class="t" text-anchor="middle">hardware-report issues</text>
  <text x="125" y="245" class="ts" text-anchor="middle">community, hourly ingest</text>

  <line x1="220" y1="124" x2="266" y2="160" class="cn" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="220" y1="178" x2="266" y2="180" class="cn" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="220" y1="232" x2="266" y2="200" class="cn" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ledger -->
  <rect class="purple" x="270" y="102" width="250" height="180" rx="6"/>
  <text x="395" y="126" class="t" text-anchor="middle">the run ledger — ships in the wheel</text>
  <text x="395" y="142" class="mono" text-anchor="middle">src/kvm_pilot/data/test_runs.jsonl</text>
  <line x1="286" y1="152" x2="504" y2="152" class="cn" stroke-width="0.5" opacity="0.4"/>
  <text x="286" y="172" class="mono">GL-RM1PE  V1.9.1  snapshot      PASS</text>
  <text x="286" y="190" class="mono">GL-RM1PE  V1.9.1  power         PASS</text>
  <text x="286" y="208" class="monofail">GL-RM1PE  V1.5.1  snapshot      FAIL #107</text>
  <text x="286" y="226" class="mono">iDRAC6    fw1.95  boot_config   PASS</text>
  <text x="286" y="244" class="mono">iDRAC6    fw1.95  serial_console PASS</text>
  <text x="286" y="266" class="ts" text-anchor="start">a FAIL is a first-class row — the ledger wins</text>

  <line x1="520" y1="192" x2="566" y2="192" class="cn" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- aggregation -->
  <rect class="card" x="570" y="150" width="260" height="84" rx="6"/>
  <text x="700" y="174" class="t" text-anchor="middle">aggregate + gate</text>
  <text x="700" y="192" class="ts" text-anchor="middle">per device × firmware × capability;</text>
  <text x="700" y="207" class="ts" text-anchor="middle">below the min-sample bar a cell shows</text>
  <text x="700" y="222" class="ts" text-anchor="middle">"insufficient data", never a verdict</text>

  <!-- ladder -->
  <text x="30" y="316" class="lab">the derived ladder — each rung needs more independent evidence</text>
  <rect class="chip0" x="30" y="330" width="180" height="58" rx="6"/>
  <text x="120" y="354" class="t" text-anchor="middle">alpha</text>
  <text x="120" y="372" class="ts" text-anchor="middle">mock/emulator only</text>
  <rect class="chip1" x="230" y="330" width="180" height="58" rx="6"/>
  <text x="320" y="354" class="tg" text-anchor="middle">beta</text>
  <text x="320" y="372" class="ts" text-anchor="middle">live-verified on real hardware</text>
  <rect class="chip2" x="430" y="330" width="180" height="58" rx="6"/>
  <text x="520" y="354" class="tg" text-anchor="middle">rc</text>
  <text x="520" y="372" class="ts" text-anchor="middle">repeated runs, multiple sources</text>
  <rect class="chip3" x="630" y="330" width="200" height="58" rx="6"/>
  <text x="730" y="354" class="tgd" text-anchor="middle">ga</text>
  <text x="730" y="372" class="ts" text-anchor="middle">broad community evidence</text>

  <line x1="700" y1="234" x2="700" y2="300" class="cn" stroke-width="1.5"/>
  <line x1="700" y1="300" x2="420" y2="300" class="cn" stroke-width="1.5"/>
  <line x1="420" y1="300" x2="420" y2="324" class="cn" stroke-width="1.5" marker-end="url(#a)"/>
</svg>
