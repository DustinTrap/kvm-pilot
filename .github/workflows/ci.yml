name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,totp,ws]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (types)
        run: mypy src/kvm_pilot

      - name: Pytest
        run: pytest --cov=kvm_pilot --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore

  redfish-integration:
    # Validates `--driver redfish` end-to-end against an external, DMTF-conformant
    # reference emulator (sushy-tools, --fake driver). The fake backend needs no
    # libvirt/QEMU and no nested KVM, so it runs on a stock GitHub-hosted runner;
    # the tests/integration conftest starts `sushy-emulator` itself.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project + external Redfish emulator
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "sushy-tools==2.2.0"   # pinned so an upstream change can't redden unrelated PRs
      - name: Integration tests vs sushy-emulator (--fake)
        run: pytest tests/integration -m integration -v

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,totp,ws]"
      - name: pip-audit (dependency CVEs)
        run: pip-audit
      - name: bandit (SAST)
        run: bandit -c pyproject.toml -r src/kvm_pilot
