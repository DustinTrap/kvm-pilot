name: Release

on:
  release:
    types: [published]

# Least-privilege default; the publish job narrows to id-token below.
permissions:
  contents: read

jobs:
  # The release path must not publish an untested or mis-versioned artifact:
  # main is not branch-protected, so the released commit may never have passed
  # CI, and the version is derived from __about__.py (not the tag).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,totp,ws]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Mypy (types)
        run: mypy src/kvm_pilot
      - name: Pytest
        run: pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify the built artifacts match the release tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-${{ github.event.release.tag_name }}}"
          V="${TAG#v}"
          echo "Release tag $TAG -> expected package version $V"
          ls -1 dist/
          ls dist/ | grep -qF "kvm_pilot-${V}-" \
            || { echo "::error::No wheel for version ${V} — release tag disagrees with src/kvm_pilot/__about__.py"; exit 1; }
          ls dist/ | grep -qF "kvm_pilot-${V}.tar.gz" \
            || { echo "::error::No sdist for version ${V} — release tag disagrees with src/kvm_pilot/__about__.py"; exit 1; }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  smoke-install:
    # Pre-publish gate: clean-room `pip install --pre` of the *exact* wheel we are
    # about to upload, in a fresh venv, asserting the bundled MCP server + skill +
    # console scripts work. Mirrors the CI `smoke-install` job (guards #110) but
    # tests the built artifact, so a broken `--pre` dependency resolution can never
    # reach PyPI. `--pre` allows pre-releases across the whole resolution, as a user
    # installing this pre-release package hits.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Install the built wheel with --pre in a clean venv
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --pre dist/*.whl
      - name: Smoke-check the shipped surfaces
        run: |
          /tmp/smoke/bin/python -c "import kvm_pilot.mcp.server as s; assert callable(s.main); print('OK: MCP server imports')"
          /tmp/smoke/bin/python -c "import importlib.resources as r; p = r.files('kvm_pilot') / 'skill' / 'SKILL.md'; assert p.is_file(); print('OK: SKILL.md shipped')"
          test -x /tmp/smoke/bin/kvm-pilot        # CLI console script
          test -x /tmp/smoke/bin/kvm-pilot-mcp    # MCP server console script
          /tmp/smoke/bin/kvm-pilot --version

  publish:
    needs: [build, test, smoke-install]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # trusted publishing (OIDC) — no API token in secrets
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  # Keep the official MCP registry listing in step with PyPI (#197). Runs after
  # the PyPI publish because the registry validates the listed package against
  # pypi.org (the README carries the `mcp-name:` ownership marker). GitHub OIDC
  # authenticates the io.github.DustinTrap namespace (case-sensitive, matches
  # the GitHub account casing) — no secret needed. A
  # registry hiccup must not fail the release itself: the PyPI artifact is
  # already out, so this job is best-effort by design (continue-on-error).
  publish-mcp-registry:
    needs: publish
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      id-token: write   # GitHub OIDC login for the io.github.* namespace
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Sync server.json version to the release tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-${{ github.event.release.tag_name }}}"
          V="${TAG#v}"
          jq --arg v "$V" '.version = $v | .packages[].version = $v' server.json > server.json.tmp
          mv server.json.tmp server.json
          jq -r '"Publishing \(.name) \(.version)"' server.json
      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          # Release assets use Go arch names (amd64/arm64), not uname's
          # x86_64/aarch64 — map them or the download 404s (b3 post-mortem).
          ARCH="$(uname -m)"
          case "$ARCH" in x86_64) ARCH=amd64 ;; aarch64) ARCH=arm64 ;; esac
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_${ARCH}.tar.gz" \
            | tar xz mcp-publisher
          ./mcp-publisher --version
      - name: Publish to the MCP registry
        run: |
          set -euo pipefail
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
