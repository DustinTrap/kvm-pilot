name: Release

on:
  release:
    types: [published]

# Least-privilege default; the publish job narrows to id-token below.
permissions:
  contents: read

jobs:
  # The release path must not publish an untested or mis-versioned artifact:
  # main is not branch-protected, so the released commit may never have passed
  # CI, and the version is derived from __about__.py (not the tag).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,totp,ws]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Mypy (types)
        run: mypy src/kvm_pilot
      - name: Pytest
        run: pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify the built artifacts match the release tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-${{ github.event.release.tag_name }}}"
          V="${TAG#v}"
          echo "Release tag $TAG -> expected package version $V"
          ls -1 dist/
          ls dist/ | grep -qF "kvm_pilot-${V}-" \
            || { echo "::error::No wheel for version ${V} — release tag disagrees with src/kvm_pilot/__about__.py"; exit 1; }
          ls dist/ | grep -qF "kvm_pilot-${V}.tar.gz" \
            || { echo "::error::No sdist for version ${V} — release tag disagrees with src/kvm_pilot/__about__.py"; exit 1; }
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # trusted publishing (OIDC) — no API token in secrets
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
